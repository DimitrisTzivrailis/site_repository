<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Will You Be My Valentine? 💖</title>
  <style>
    body {
      background: #ffe6ec;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 40px;
      overflow: hidden;
      position: relative;
    } 

    img {
      max-width: 90%;
      height: auto;
      border-radius: 20px;
    }

    h1 {
      color: #d6336c;
      margin-top: 30px;
    }

    .buttons {
      margin-top: 40px;
      position: relative;
      height: 200px;
    }

    button {
      font-size: 22px;
      padding: 15px 35px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      position: absolute;
      transition: all 0.3s ease;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      left: 50%;
      transform: translateX(-120%);
    }

    #noBtn {
      background-color: #adb5bd;
      color: white;
      left: 50%;
      transform: translateX(20%);
    }

    #yesMessage {
      display: none;
      margin-top: 40px;
      font-size: 28px;
      color: #d6336c;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      color: #ff4d6d;
      pointer-events: none;
      animation: floatUp 4s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-500px) scale(1.5); opacity: 0; }
    }
  </style>
</head>
<body>

  <img src="love.gif" alt="Love GIF">

  <h1 id="greeting">Will you be my Valentine? 💘</h1>

  <div class="buttons">
    <button id="yesBtn" onclick="showLove()">YES 💖</button>
    <button id="noBtn" onmouseover="runAway()">NO 🙈</button>
  </div>

  <div id="yesMessage">
    YAY!!! 💕💞 🥰<br>
    <span id="customMessage"></span>
  </div>

  <!-- Confetti canvas -->
  <canvas id="confettiCanvas" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    // Custom name
    const herName = "Emma"; // Change this to your love's name

    function showLove() {
      document.querySelector(".buttons").style.display = "none";
      document.getElementById("yesMessage").style.display = "block";
      document.getElementById("customMessage").innerText = `I love you, ${Stella}! 😘`;

      // Confetti explosion
      const duration = 3000;
      const end = Date.now() + duration;

      (function frame() {
        confetti({
          particleCount: 5,
          angle: 60,
          spread: 55,
          origin: { x: 0 },
        });
        confetti({
          particleCount: 5,
          angle: 120,
          spread: 55,
          origin: { x: 1 },
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      }());

      // Floating hearts
      setInterval(createHeart, 400);
    }

    function runAway() {
      const noBtn = document.getElementById("noBtn");

      const maxX = window.innerWidth - noBtn.offsetWidth - 100;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerText = "💖";
      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.fontSize = (20 + Math.random() * 20) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 4000);
    }
  </script>

</body>
</html>
