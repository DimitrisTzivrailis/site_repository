<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom, #ffe6eb, #ffd6e0);
      text-align: center;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    h1 {
      color: #d6336c;
      margin-top: 30px;
      font-size: 36px;
      z-index: 2;
      position: relative;
    }

    p {
      color: #6a1b4d;
      font-size: 22px;
      width: 80%;
      margin: auto;
      line-height: 1.6;
      z-index: 2;
      position: relative;
    }

    img {
      max-width: 250px;
      margin-top: 20px;
      border-radius: 20px;
      z-index: 2;
      position: relative;
    }

    .buttons {
      margin-top: 50px;
      position: relative;
      height: 250px;
      z-index: 2;
    }

    button {
      font-size: 22px;
      padding: 15px 35px;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      position: absolute;
      transition: 0.3s;
    }

    #yesBtn {
      background-color: #ff4d6d;
      color: white;
      left: 40%;
    }

    #noBtn {
      background-color: #6c757d;
      color: white;
      left: 55%;
    }

    #message {
      display: none;
      margin-top: 40px;
      font-size: 30px;
      color: #d6336c;
      font-weight: bold;
      z-index: 2;
      position: relative;
    }

    .heart {
      position: absolute;
      color: rgba(255, 0, 100, 0.7);
      font-size: 24px;
      animation: float 6s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
        opacity: 1;
      }
      to {
        transform: translateY(-10vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <img src="bubu-dudu-kisses.gif" alt="Love">

  <h1>I Am Sorry ❤️</h1>

  <p>
    I want to sincerely say I am sorry...
    You are very precious to me, and I love you deeply 💕
    My heart always chooses you 🌹
  </p>

  <h1>Do you still love me? 💘</h1>

  <div class="buttons">
    <button id="yesBtn" onclick="showMessage()">YES ❤️</button>
    <button id="noBtn" onmouseover="runAway()">NO 🙈</button>
  </div>

  <div id="message">
    Thank you my love 💖🥰 You make my world beautiful 🌹
  </div>

  <script>
    function showMessage() {
      document.querySelector(".buttons").style.display = "none";
      document.getElementById("message").style.display = "block";
    }

    function runAway() {
      const noBtn = document.getElementById("noBtn");

      const maxX = window.innerWidth - noBtn.offsetWidth;
      const maxY = window.innerHeight - noBtn.offsetHeight;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";

      heart.style.left = Math.random() * window.innerWidth + "px";
      heart.style.fontSize = (20 + Math.random() * 20) + "px";
      heart.style.animationDuration = (3 + Math.random() * 3) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
